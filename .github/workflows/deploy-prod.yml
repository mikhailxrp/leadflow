name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /apps/leadkanal-prod
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        working-directory: /apps/leadkanal-prod
        run: npm install

      - name: Generate Prisma Client
        working-directory: /apps/leadkanal-prod
        run: npx prisma generate

      - name: Run migrations
        working-directory: /apps/leadkanal-prod
        run: npx prisma migrate deploy

      - name: Build
        working-directory: /apps/leadkanal-prod
        run: npm run build

      - name: Restart PM2
        working-directory: /apps/leadkanal-prod
        run: pm2 restart leadkanal-prod

      - name: Restart Telegram bot
        working-directory: /apps/leadkanal-prod
        run: |
          if pm2 describe leadkanal-prod-bot > /dev/null 2>&1; then
            pm2 restart leadkanal-prod-bot
          else
            pm2 start npm --name leadkanal-prod-bot -- run bot:telegram
          fi
          pm2 save
