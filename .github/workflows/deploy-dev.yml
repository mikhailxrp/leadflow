name: Deploy Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /apps/leadkanal-dev
        run: |
          git fetch origin dev
          git reset --hard origin/dev

      - name: Install dependencies
        working-directory: /apps/leadkanal-dev
        run: npm install

      - name: Generate Prisma Client
        working-directory: /apps/leadkanal-dev
        run: npx prisma generate

      - name: Run migrations
        working-directory: /apps/leadkanal-dev
        run: npx prisma migrate deploy

      - name: Build
        working-directory: /apps/leadkanal-dev
        run: npm run build

      - name: Restart PM2
        working-directory: /apps/leadkanal-dev
        run: pm2 restart leadkanal-dev

      - name: Restart Telegram bot
        working-directory: /apps/leadkanal-dev
        run: |
          if pm2 describe leadkanal-dev-bot > /dev/null 2>&1; then
            pm2 restart leadkanal-dev-bot
          else
            pm2 start npm --name leadkanal-dev-bot -- run bot:telegram
          fi
          pm2 save
